name: Release

# Build prebuilt binaries and attach them to a GitHub Release when a
# version tag is pushed (e.g. `git tag v0.1.0 && git push --tags`).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Create the GitHub Release first so the binary jobs have somewhere to upload.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          title: "sigil $tag"
          token: ${{ secrets.GITHUB_TOKEN }}

  binaries:
    needs: create-release
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build and upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: sigil
          target: ${{ matrix.target }}
          # Bundle the license and README alongside the binary.
          include: LICENSE,README.md
          token: ${{ secrets.GITHUB_TOKEN }}
